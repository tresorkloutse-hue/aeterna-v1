name: AETERNA v2 — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─── QUALITÉ ──────────────────────────────────────────────────
  quality:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint --max-warnings 5
        continue-on-error: true

  # ─── BUILD ────────────────────────────────────────────────────
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL:           https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY:      placeholder
      SUPABASE_SERVICE_ROLE_KEY:          placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY:                  sk_test_placeholder
      STRIPE_WEBHOOK_SECRET:              whsec_placeholder
      STRIPE_PRICE_ESSENCE:               price_placeholder
      STRIPE_PRICE_HERITAGE:              price_placeholder
      STRIPE_PRICE_DIAMOND:               price_placeholder
      RESEND_API_KEY:                     re_placeholder
      RESEND_FROM:                        sanctuaire@aeterna.co
      ADMIN_SECRET:                       placeholder_admin_secret_32chars_long
      CRON_SECRET:                        placeholder_cron_secret_32chars_long
      NEXT_PUBLIC_BASE_URL:               https://aeterna.co

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: .next/
          retention-days: 3

  # ─── TESTS E2E ────────────────────────────────────────────────
  e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: build
    env:
      NEXT_PUBLIC_SUPABASE_URL:           https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY:      placeholder
      SUPABASE_SERVICE_ROLE_KEY:          placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY:                  sk_test_placeholder
      STRIPE_WEBHOOK_SECRET:              whsec_placeholder
      STRIPE_PRICE_ESSENCE:               price_placeholder
      STRIPE_PRICE_HERITAGE:              price_placeholder
      STRIPE_PRICE_DIAMOND:               price_placeholder
      RESEND_API_KEY:                     re_placeholder
      RESEND_FROM:                        sanctuaire@aeterna.co
      ADMIN_SECRET:                       placeholder_admin_secret_32chars_long
      CRON_SECRET:                        placeholder_cron_secret_32chars_long
      NEXT_PUBLIC_BASE_URL:               http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: .next/
      - name: Start server + run E2E
        run: |
          npx next start --port 3000 &
          sleep 8
          node test-e2e.mjs --url http://localhost:3000

  # ─── SÉCURITÉ ─────────────────────────────────────────────────
  security:
    name: Audit dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  # ─── DÉPLOIEMENT ──────────────────────────────────────────────
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [build, e2e, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm install -g vercel@latest

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        env:
          NEXT_PUBLIC_SUPABASE_URL:           ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:      ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:          ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY:                  ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET:              ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ESSENCE:               ${{ secrets.STRIPE_PRICE_ESSENCE }}
          STRIPE_PRICE_HERITAGE:              ${{ secrets.STRIPE_PRICE_HERITAGE }}
          STRIPE_PRICE_DIAMOND:               ${{ secrets.STRIPE_PRICE_DIAMOND }}
          RESEND_API_KEY:                     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:                        ${{ secrets.RESEND_FROM }}
          ADMIN_SECRET:                       ${{ secrets.ADMIN_SECRET }}
          CRON_SECRET:                        ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_BASE_URL:               ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Déployé : $URL"
